services:
  - type: web
    name: maesil-creator
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FAL_KEY
        sync: false
      - key: PORTONE_API_SECRET
        sync: false
      - key: PORTONE_STORE_ID
        sync: false
      - key: PORTONE_CHANNEL_KEY_CARD
        sync: false
      - key: PORTONE_CHANNEL_KEY_KAKAO
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: APP_URL
        value: https://maesil-studio.onrender.com
