<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>비밀번호 찾기 — 매실 스튜디오</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    :root { --brand-primary: #e8355a; }
    body { background: #f5f7fa; font-family: 'Pretendard','Noto Sans KR',sans-serif; }
    .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); padding: 2.5rem; width: 100%; max-width: 420px; }
    .btn-green { background: var(--brand-primary); color: #fff; border: none; font-weight: 600; }
    .btn-green:hover { background: #c42648; color: #fff; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <h5 class="fw-bold mb-1">비밀번호 재설정</h5>
    <p class="text-muted small mb-4">가입한 이메일을 입력하면 재설정 링크를 보내드립니다.</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label small fw-semibold">이메일</label>
        <input type="email" name="email" class="form-control" placeholder="hello@example.com" required autofocus>
      </div>
      <button type="submit" class="btn btn-green w-100">재설정 링크 받기</button>
    </form>
    <div class="text-center mt-3">
      <a href="{{ url_for('auth.login') }}" class="text-muted small">← 로그인으로 돌아가기</a>
    </div>
  </div>
</div>
</body>
</html>
