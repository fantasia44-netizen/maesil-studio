<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 — 매실 스튜디오</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root { --brand-primary: #e8355a; }
    body { background: #f5f7fa; font-family: 'Pretendard', 'Noto Sans KR', sans-serif; }
    .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); padding: 2.5rem; width: 100%; max-width: 420px; }
    .brand-logo { font-size: 1.4rem; font-weight: 800; color: #1a2332; }
    .brand-logo span { color: var(--brand-primary); }
    .btn-green { background: var(--brand-primary); color: #fff; border: none; font-weight: 600; }
    .btn-green:hover { background: #c42648; color: #fff; }
    .form-control:focus { border-color: var(--brand-primary); box-shadow: 0 0 0 .2rem rgba(232,53,90,.2); }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="brand-logo">매실 <span>스튜디오</span></div>
      <p class="text-muted small mt-1">AI 브랜드 콘텐츠 플랫폼</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ 'danger' if cat == 'error' else cat }} py-2 small">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label small fw-semibold">이메일</label>
        <input type="email" name="email" class="form-control" placeholder="hello@example.com" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">비밀번호</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <div class="d-flex justify-content-end mb-3">
        <a href="{{ url_for('auth.find_account') }}" class="text-muted small">비밀번호를 잊으셨나요?</a>
      </div>
      <button type="submit" class="btn btn-green w-100 py-2">로그인</button>
    </form>

    <hr class="my-4">
    <p class="text-center text-muted small mb-0">
      계정이 없으신가요? <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-semibold" style="color:var(--brand-primary)">무료 가입</a>
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
