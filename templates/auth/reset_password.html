<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>비밀번호 재설정 — 매실 크리에이터</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    :root { --brand-primary: #e8355a; }
    body { background: #f5f7fa; font-family: 'Pretendard','Noto Sans KR',sans-serif; }
    .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); padding: 2.5rem; width: 100%; max-width: 420px; }
    .btn-green { background: var(--brand-primary); color: #fff; border: none; font-weight: 600; }
    .btn-green:hover { background: #c42648; color: #fff; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <h5 class="fw-bold mb-1">새 비밀번호 설정</h5>
    <p class="text-muted small mb-4">{{ email }}의 새 비밀번호를 입력하세요.</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="token" value="{{ token }}">
      <div class="mb-3">
        <label class="form-label small fw-semibold">새 비밀번호</label>
        <input type="password" name="new_password" class="form-control" placeholder="8자 이상" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">비밀번호 확인</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-green w-100">비밀번호 변경</button>
    </form>
  </div>
</div>
</body>
</html>
