{% extends 'base.html' %}
{% block title %}운영사 추가 — 어드민{% endblock %}
{% block breadcrumb %}어드민 / <a href="{{ url_for('admin.operators') }}">운영사</a> / 추가{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header fw-bold">운영사 추가</div>
      <div class="card-body">
        <form method="POST" action="{{ url_for('admin.operator_new') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label fw-semibold small">운영사명 <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" placeholder="예: 매실" required autofocus
                   value="{{ operator.name if operator else '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold small">플랜</label>
            <select name="plan_type" class="form-select">
              <option value="starter">Starter</option>
              <option value="growth">Growth</option>
              <option value="pro" selected>Pro</option>
            </select>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label fw-semibold small">최대 브랜드 수</label>
              <input type="number" name="max_brands" class="form-control" value="10" min="1">
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold small">최대 팀원 수</label>
              <input type="number" name="max_users" class="form-control" value="20" min="1">
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn fw-semibold px-4" style="background:#e8355a;color:#fff">생성</button>
            <a href="{{ url_for('admin.operators') }}" class="btn btn-outline-secondary px-4">취소</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
